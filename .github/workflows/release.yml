name: Build & Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pyinstaller imageio-ffmpeg customtkinter yt-dlp pillow

      - name: Copy ffmpeg
        run: |
          python -c "import imageio_ffmpeg, shutil, os; os.makedirs('bin', exist_ok=True); shutil.copy2(imageio_ffmpeg.get_ffmpeg_exe(), os.path.join('bin', 'ffmpeg.exe'))"

      - name: Build exe (onedir)
        run: |
          $ctk = python -c "import customtkinter, os; print(os.path.dirname(customtkinter.__file__))"
          python -m PyInstaller `
            --noconfirm `
            --onedir `
            --windowed `
            --name "Vex" `
            "--add-data=$ctk;customtkinter" `
            "--add-data=bin\ffmpeg.exe;bin" `
            "--add-data=assets;assets" `
            "--icon=assets\app.ico" `
            --collect-data yt_dlp `
            app.py

      - name: Extract version from tag
        id: version
        run: |
          $v = "${{ github.ref_name }}".TrimStart('v')
          echo "VERSION=$v" >> $env:GITHUB_OUTPUT

      - name: Build installer
        run: |
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          & $iscc /DAppVersion="${{ steps.version.outputs.VERSION }}" installer.iss

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: Output/Vex Setup.exe
          generate_release_notes: true
